name: "Reusable ci test workflow"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            symbol: 🐧
            platform: Linux
            container_image: ghcr.io/hrzlgnm/mdns-browser-ubuntu-builder:v1@sha256:3a003816c32da943aca8145efe6eab3a44363765312afc380ca55b34fad3eeb2
          - os: "macos-latest"
            symbol: 🍏
          - os: "windows-latest"
            symbol: 🪟
    runs-on: ${{matrix.os}}
    name: ${{matrix.symbol}}✅
    container: ${{ contains(matrix.os, 'ubuntu') && matrix.container_image || null }}
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 🦀🚀
        uses: ./.github/actions/setup-rust-cache
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown' || 'wasm32-unknown-unknown' }}

      - name: 🛠️ nextest
        uses: baptiste0928/cargo-install@b687c656bda5733207e629b50a22bf68974a0305 # v3
        with:
          crate: cargo-nextest
          version: 0.9.127
          locked: true

      - name: 🛠️🚀
        uses: ./.github/actions/setup-sccache

      - name: ✅ Run tests with nextest
        shell: bash
        run: |
          cargo --locked nextest run -p mdns-browser -p models --profile ci

      - name: 📋 JUnit Report
        if: always()
        uses: mikepenz/action-junit-report@74626db7353a25a20a72816467ebf035f674c5f8 # v6
        with:
          report_paths: "**/junit.xml"
          fail_on_parse_error: true
          require_tests: true
          include_passed: true
          check_name: "${{ matrix.symbol }} JUnit Report"
