name: Retry Failed CI on PRs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  retry-failed:
    uses: hrzlgnm/actions/.github/workflows/retry-failed-ci-reusable.yml@5c3ee62b20f3732929760d8b3c793c28a5f3e3a1 # main
    permissions:
      actions: write
      contents: read
    with:
      workflow: ci.yml
      hours: 24
