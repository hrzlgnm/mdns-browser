name: "CI"

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  # measure against bitrot
  # also rotates docker images monthly, by pushing new docker images
  # the rotation will happen by renovate
  # rotate the images in the middle of the month,
  # to avoid duplicate rotations at the beginning of the month,
  # as the source docker images are also mostly rotated once a month
  schedule:
    - cron: "0 0 15 * *"

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

concurrency:
  # On main, we want all builds to complete even if merging happens faster to make it easier to discover at which point something broke.
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    name: "🏷️ Label PR"
    permissions:
      contents: read # needed to read repository contents for labeler config
      pull-requests: write # needed to apply labels to PRs
      issues: write # needed to create non-existing labels
    runs-on: ubuntu-slim

    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          configuration-path: .github/labeler.yml

  changes:
    name: "🔍 Detect Changes"
    runs-on: ubuntu-slim
    outputs:
      actionlint: ${{ steps.filter.outputs.actionlint }}
      android: ${{ steps.filter.outputs.android }}
      aur: ${{ steps.filter.outputs.aur }}
      branch: ${{ steps.branch.outputs.branch }}
      desktop: ${{ steps.filter.outputs.desktop }}
      docker: ${{ steps.filter.outputs.docker }}
      lint: ${{ steps.filter.outputs.lint }}
      tauri: ${{ steps.filter.outputs.tauri }}
      tests: ${{ steps.filter.outputs.tests }}
      void: ${{ steps.filter.outputs.void }}
      winget: ${{ steps.filter.outputs.winget }}
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 🔍 Check for changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            actionlint:
              - '.github/workflows/*.yml'
              - '.github/actions/*/action.yml'
            android:
              - '.github/actions/sbom/**'
              - '.github/workflows/android-reusable.yml'
              - 'src-tauri/capabilities/mobile.json'
              - 'src-tauri/icons/android/**'
              - 'src-tauri/tauri.android.conf.json'
            aur:
              - '.github/workflows/aur-reusable.yml'
              - '.github/actions/latest-release-info/action.yml'
              - 'packaging/aur/**'
            desktop:
              - '.github/actions/sbom/**'
              - '.github/workflows/desktop-reusable.yml'
              - 'src-tauri/capabilities/migrated.json'
              - 'src-tauri/icons/*.icns'
              - 'src-tauri/icons/*.ico'
              - 'src-tauri/icons/*.png'
              - 'src-tauri/icons/*.svg'
              - 'src-tauri/tauri.conf.json'
            docker:
              - '.github/docker/**'
            tauri:
              - '.github/actions/setup-*/**'
              - 'crates/**'
              - 'public/**'
              - 'src/**'
              - 'src-tauri/Cargo.toml'
              - 'src-tauri/src/**'
              - 'src-tauri/build.rs'
              - 'index.html'
              - 'index.js'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'style.css'
              - '.taurignore'
            lint:
              - '.github/workflows/lint-reusable.yml'
            tests:
              - '.github/workflows/test-reusable.yml'
              - '.config/nextest.toml'
            void:
              - '.github/workflows/void-reusable.yml'
              - 'packaging/void/**'
            winget:
              - '.github/workflows/winget-reusable.yml'
              - '.github/actions/latest-release-info/action.yml'

      - name: Output branch name
        id: branch
        run: |
          echo "branch=${{ env.BRANCH_NAME }}" >> "$GITHUB_OUTPUT"

  typos:
    name: 📝 Check typos
    if: always()
    uses: hrzlgnm/actions/.github/workflows/typos-reusable.yml@292498dae084d4097c6dea750cf8b23f865a83eb # v2.0.4

  actionlint:
    name: "🔍 Validate Workflows"
    needs: changes
    runs-on: ubuntu-latest
    container: ghcr.io/hrzlgnm/mdns-browser-arch-aur-builder:v1@sha256:0d1a4ba01fd4d82d86837a21074e1300928de6668678dbb65b6d10a92d9b2ad4
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 📋 Determine actionlint result
        id: actionlint_check
        run: |
          if [[ "${{ needs.changes.outputs.actionlint }}" == "true" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Validate workflows
        if: steps.actionlint_check.outputs.should_run == 'true'
        run: |
          actionlint .github/workflows/*.yml

  aur:
    name: AUR
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.aur == 'true'
    uses: ./.github/workflows/aur-reusable.yml

  void:
    name: Void
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.void == 'true'
    uses: ./.github/workflows/void-reusable.yml

  winget:
    name: winget
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.winget == 'true'
    uses: ./.github/workflows/winget-reusable.yml
    secrets: inherit

  lint:
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.tauri == 'true' || needs.changes.outputs.lint == 'true'
    uses: ./.github/workflows/lint-reusable.yml

  tests:
    permissions:
      checks: write # required for action-junit-report annotation
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.tauri == 'true' || needs.changes.outputs.tests == 'true'
    uses: ./.github/workflows/test-reusable.yml

  android:
    name: "📱"
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.tauri == 'true' || needs.changes.outputs.android == 'true'
    permissions:
      contents: write # needed to upload build artifacts
    uses: ./.github/workflows/android-reusable.yml
    secrets: inherit
    with:
      branch: ${{ needs.changes.outputs.branch }}

  desktop:
    name: "🖥️"
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.tauri == 'true' || needs.changes.outputs.desktop == 'true'
    permissions:
      contents: write # needed to upload build artifacts
    uses: ./.github/workflows/desktop-reusable.yml
    secrets: inherit
    with:
      branch: ${{ needs.changes.outputs.branch }}

  cache-tools:
    needs:
      - android
      - desktop
      - lint
      - tests
    name: "📦 Cache tools"
    if: always() && ( github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' )
    uses: ./.github/workflows/cache-tools-reusable.yml

  docker:
    name: "🐳"
    needs:
      - changes
      - actionlint
    if: needs.changes.outputs.docker == 'true'
    permissions:
      contents: read # needed to checkout code for docker build
      packages: write # needed to push to GHCR

    uses: hrzlgnm/actions/.github/workflows/docker-reusable.yml@292498dae084d4097c6dea750cf8b23f865a83eb # v2.0.4
    with:
      branch: ${{ needs.changes.outputs.branch }}

  all-required-green: # This job does nothing and is only used for the branch protection
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      - typos
      - actionlint
      - aur
      - void
      - winget
      - lint
      - tests
      - android
      - desktop
      - docker
      - cache-tools
    if: always()
    steps:
      - name: Check whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@a638d6464689bbb24c325bb3fe9404d63a913030
        with:
          allowed-skips: >-
            aur,
            void,
            winget,
            lint,
            tests,
            android,
            desktop,
            docker,
            cache-tools
          jobs: ${{ toJSON(needs) }}
