name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (no commits/tags/releases)
        required: true
        type: boolean
        default: false
      create_release:
        description: Create pre-release after version bump
        required: true
        type: boolean
        default: true

jobs:
  version_management:
    permissions:
      actions: write # to trigger other workflows and read workflow run status
      contents: write # to update version files, create commits, and push tags
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version || steps.release-version.outputs.version }}
    env:
      GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      RULESET: repos/${{github.repository}}/rulesets/4895698
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 🦀🚀
        uses: ./.github/actions/setup-rust-cache
        with:
          save-cache: false

      - name: 🔧 Install cargo-edit
        uses: baptiste0928/cargo-install@b687c656bda5733207e629b50a22bf68974a0305 # v3
        with:
          crate: cargo-edit
          version: 0.13.8
          locked: true

      - id: version
        name: 🔢 Calculate semantic version
        run: |
          # Get current version from tauri.conf.json
          CURRENT_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)

          # Use cargo-edit to bump version
          case "${{ inputs.version }}" in
            "patch")
              NEW_VERSION=$(cargo bump patch --dry-run | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
              ;;
            "minor")
              NEW_VERSION=$(cargo bump minor --dry-run | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
              ;;
            "major")
              NEW_VERSION=$(cargo bump major --dry-run | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
              ;;
            *)
              echo "Unknown version bump type: ${{ inputs.version }}. Must be one of: patch, minor, major"
              exit 1
              ;;
          esac

          if [ -z "$NEW_VERSION" ]; then
            echo "Failed to calculate new version"
            exit 1
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - id: release-version
        name: 🏷️ Extract version from release
        if: github.event_name == 'release'
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Remove mdns-browser-v prefix to get just the version
          VERSION="${TAG_NAME#mdns-browser-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: 🔄 Update cargo and tauri versions
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Update workspace and crate versions using cargo-edit with version from version calculation
          cargo set-version --workspace ${{ steps.version.outputs.version }}

          # Update Cargo.lock to reflect new versions
          cargo update --workspace

          # Update Tauri config files
          jq --indent 4 '.version="${{ steps.version.outputs.version }}"' src-tauri/tauri.conf.json > tauri.config.json.new && mv tauri.config.json.new src-tauri/tauri.conf.json
          jq --indent 4 '.version="${{ steps.version.outputs.version }}"' src-tauri/tauri.android.conf.json > tauri.android.config.json.new && mv tauri.android.config.json.new src-tauri/tauri.android.conf.json

      - name: 🔑 Set up SSH signing key
        if: (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_SIGNING_KEY }}" > ~/.ssh/id_ed25519_signing
          chmod 600 ~/.ssh/id_ed25519_signing
          git config --global gpg.format ssh
          git config --global user.signingKey ~/.ssh/id_ed25519_signing
          git config --global user.name "hrzlgnm"
          git config --global user.email "hrzlgnm@users.noreply.github.com"

      - name: ⏳ Temporary disable ruleset enforcement
        if: (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          gh api \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} | jq '.enforcement = "disabled"' | \
          gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} \
          --input -

      - name: 💾🏷️⬆️ Commit, tag and push
        if: (!inputs.dry_run)
        run: |
          git add -A
          git commit -S -m "Bump version to ${{ steps.version.outputs.version }}"
          git tag -s -a mdns-browser-v${{ steps.version.outputs.version }} -m "mDNS-Browser Release v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: 👮 Re-enable enforcement of rules
        if: (always() && github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          gh api \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} | jq '.enforcement = "active"' | \
          gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} \
          --input -

  create_prerelease:
    needs: [version_management]
    if: (inputs.create_release == 'true' && !inputs.dry_run)
    outputs:
      tagName: mdns-browser-v${{ needs.version_management.outputs.version }}
    permissions:
      contents: write # to create, update, and manage releases and drafts
    runs-on: ubuntu-slim
    name: 🚀 Create Pre-release
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 🗒️ Create pre-release
        id: pre-release
        uses: release-drafter/release-drafter@6db134d15f3909ccc9eefd369f02bd1e9cffdf97 # v6.2.0
        with:
          latest: false
          name: "mDNS-Browser Release v${{ needs.version_management.outputs.version }}"
          prerelease: true
          publish: true
          tag: mdns-browser-v${{ needs.version_management.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  source_checksums:
    needs: [version_management]
    if: (inputs.create_release == 'true' && !inputs.dry_run)
    permissions:
      contents: write # to upload source checksums to release
      actions: read # to access workflow run information and secrets
    name: 🔢 Generate Source Checksums
    uses: ./.github/workflows/source-checksums-reusable.yml
    secrets: inherit
    with:
      tagName: mdns-browser-v${{ needs.version_management.outputs.version }}

  build_android:
    needs: [version_management]
    if: (inputs.create_release == 'true' && !inputs.dry_run)
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
    name: 🔨 Build Android
    uses: ./.github/workflows/android-reusable.yml
    secrets: inherit
    with:
      tagName: mdns-browser-v${{ needs.version_management.outputs.version }}

  build_desktop:
    needs: [version_management]
    if: (inputs.create_release == 'true' && !inputs.dry_run)
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
    name: 🔨 Build Desktop
    uses: ./.github/workflows/desktop-reusable.yml
    secrets: inherit
    with:
      tagName: mdns-browser-v${{ needs.version_management.outputs.version }}

  build_void:
    needs: [version_management, source_checksums]
    if: (inputs.create_release == 'true' && !inputs.dry_run)
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
    name: 🔨 Build Void
    uses: ./.github/workflows/void-reusable.yml
    secrets: inherit
    with:
      tagName: mdns-browser-v${{ needs.version_management.outputs.version }}

  asset_checksums:
    needs:
      [
        version_management,
        create_prerelease,
        build_android,
        build_desktop,
        build_void,
      ]
    if: (inputs.create_release == 'true' && !inputs.dry_run)
    permissions:
      contents: write # to update release with checksums and artifacts
      actions: read # to access workflow run information and secrets
    name: 🔢 Generate Asset Checksums
    uses: ./.github/workflows/asset-checksums-reusable.yml
    secrets: inherit
    with:
      tagName: mdns-browser-v${{ needs.version_management.outputs.version }}
