name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: Dry run (no commits/tags/releases)
        required: true
        type: boolean
        default: false
      create-release:
        description: Create pre-release after version bump
        required: true
        type: boolean
        default: true

jobs:
  bump_version:
    permissions:
      actions: write # to trigger other workflows and read workflow run status
      contents: write # to update version files, create commits, and push tags
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version}}
      tagName: mdns-browser-v${{ steps.version.outputs.version}}
    env:
      GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      RULESET: repos/${{github.repository}}/rulesets/4895698
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 🦀🚀
        uses: ./.github/actions/setup-rust-cache
        with:
          save-cache: false

      - name: 🔧 Install cargo-edit
        uses: baptiste0928/cargo-install@b687c656bda5733207e629b50a22bf68974a0305 # v3
        with:
          crate: cargo-edit
          version: 0.13.8
          locked: true

      - name: 🔢 Bump semantic version
        id: version
        shell: bash
        run: |
          CURRENT_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            case "${{ inputs.version }}" in
              "patch")
                NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
                ;;
              "minor")
                NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
                ;;
              "major")
                NEW_VERSION="$((MAJOR + 1)).0.0"
                ;;
              *)
                echo "Error: Invalid version bump type '${{ inputs.version }}'. Must be patch, minor, or major."
                exit 1
                ;;
            esac
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Dry run: would bump from $CURRENT_VERSION to $NEW_VERSION"
          else
            cargo set-version --bump "${{ inputs.version }}"
            NEW_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
            cargo update -q

            # Update Tauri config files
            jq --indent 4 ".version=\"$NEW_VERSION\"" src-tauri/tauri.conf.json > tauri.config.json.new && mv tauri.config.json.new src-tauri/tauri.conf.json
            jq --indent 4 ".version=\"$NEW_VERSION\"" src-tauri/tauri.android.conf.json > tauri.android.config.json.new && mv tauri.android.config.json.new src-tauri/tauri.android.conf.json
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Bumped version from $CURRENT_VERSION to $NEW_VERSION"
          fi

      - name: 🔑 Set up SSH signing key
        if: (!inputs.dry-run)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_SIGNING_KEY }}" > ~/.ssh/id_ed25519_signing
          chmod 600 ~/.ssh/id_ed25519_signing
          git config --global gpg.format ssh
          git config --global user.signingKey ~/.ssh/id_ed25519_signing
          git config --global user.name "hrzlgnm"
          git config --global user.email "hrzlgnm@users.noreply.github.com"

      - name: ⏳ Temporary disable ruleset enforcement
        if: (!inputs.dry-run)
        run: |
          gh api \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} | jq '.enforcement = "disabled"' | \
          gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} \
          --input -

      - name: 💾🏷️⬆️ Commit, tag and push
        if: (!inputs.dry-run)
        run: |
          git add -A
          git commit -S -m "Bump version to ${{ steps.version.outputs.version }}"
          git tag -s -a mdns-browser-v${{ steps.version.outputs.version }} -m "mDNS-Browser Release v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: 👮 Re-enable enforcement of rules
        if: (always() && !inputs.dry-run)
        run: |
          gh api \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} | jq '.enforcement = "active"' | \
          gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          ${RULESET} \
          --input -

  create_prerelease:
    needs: [bump_version]
    if: (inputs.create-release && !inputs.dry-run)
    permissions:
      contents: write # to create, update, and manage releases and drafts
    runs-on: ubuntu-slim
    name: 🚀 Create Pre-release
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 🗒️ Create pre-release
        uses: release-drafter/release-drafter@6db134d15f3909ccc9eefd369f02bd1e9cffdf97 # v6.2.0
        with:
          latest: false
          name: "mDNS-Browser Release v${{ needs.bump_version.outputs.version }}"
          prerelease: true
          publish: true
          tag: mdns-browser-v${{ needs.bump_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  source_checksums:
    needs: [bump_version, create_prerelease]
    if: (inputs.create-release && !inputs.dry-run)
    permissions:
      contents: write # to upload source checksums to release
      actions: read # to access workflow run information and secrets
    name: 🔢 Generate Source Checksums
    uses: ./.github/workflows/source-checksums-reusable.yml
    secrets: inherit
    with:
      tagName: ${{ needs.bump_version.outputs.tagName }}

  build_android:
    needs: [bump_version, create_prerelease]
    if: (inputs.create-release && !inputs.dry-run)
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
    name: 🔨 Build Android
    uses: ./.github/workflows/android-reusable.yml
    secrets: inherit
    with:
      tagName: ${{ needs.bump_version.outputs.tagName }}

  build_desktop:
    needs: [bump_version, create_prerelease]
    if: (inputs.create-release && !inputs.dry-run)
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
    name: 🔨 Build Desktop
    uses: ./.github/workflows/desktop-reusable.yml
    secrets: inherit
    with:
      tagName: ${{ needs.bump_version.outputs.tagName }}

  build_void:
    needs: [bump_version, create_prerelease, source_checksums]
    if: (inputs.create-release && !inputs.dry-run)
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
    name: 🔨 Build Void
    uses: ./.github/workflows/void-reusable.yml
    secrets: inherit
    with:
      tagName: ${{ needs.bump_version.outputs.tagName }}

  asset_checksums:
    needs:
      [
        bump_version,
        source_checksums,
        create_prerelease,
        build_android,
        build_desktop,
        build_void,
      ]
    if: (inputs.create-release && !inputs.dry-run)
    permissions:
      contents: write # to update release with checksums and artifacts
      actions: read # to access workflow run information and secrets
    name: 🔢 Generate Asset Checksums
    uses: ./.github/workflows/asset-checksums-reusable.yml
    secrets: inherit
    with:
      tagName: ${{ needs.bump_version.outputs.tagName }}
