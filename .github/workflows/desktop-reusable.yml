name: "Reusable desktop tauri build workflow"

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ""
      tagName:
        required: false
        type: string
    secrets:
      TAURI_PRIVATE_KEY:
        required: true
      TAURI_KEY_PASSWORD:
        required: true
      WINDOWS_CERTIFICATE:
        required: false
      WINDOWS_CERTIFICATE_PASSWORD:
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            symbol: 🐧
            platform: Linux
            container_image: ghcr.io/hrzlgnm/mdns-browser-ubuntu-builder:v1@sha256:8534b6a400016586b9fc1b1bccf73964856fedb23f980a47df280fc2396fb68f
          - os: "macos-latest"
            args: "--target universal-apple-darwin"
            symbol: 🍏
            platform: macOS
          - os: "windows-latest"
            symbol: 🪟
            platform: Windows

    name: ${{matrix.symbol}}🔨
    runs-on: ${{matrix.os}}
    container: ${{ contains(matrix.os, 'ubuntu') && matrix.container_image || null }}
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tagName || github.ref }}
          fetch-depth: ${{ inputs.tagName && '0' || '1' }}

      - name: 📝 Extract version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          CURRENT_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: 🛡️ Verify tag matches version in tauri config (publish only)
        if: inputs.tagName
        shell: bash
        run: |
          CURRENT_VERSION=${{ steps.get-version.outputs.current-version }}
          TAG=${{ inputs.tagName }}
          if [[ "$TAG" != *"$CURRENT_VERSION" ]]
          then
            echo "The tag name ${TAG} does not match the version ${CURRENT_VERSION} from tauri config"
            exit 1
          fi

      - name: 🦀🚀
        uses: ./.github/actions/setup-rust-cache
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown' || 'wasm32-unknown-unknown' }}
          save-cache: ${{ inputs.branch == 'main' }}

      - name: 📜 Create and 🔍 scan SBOM for vulnerabilities
        if: inputs.tagName
        uses: ./.github/actions/sbom
        with:
          artifact-name: "sbom.${{ matrix.platform }}.spdx.json"
          current-version: ${{ steps.get-version.outputs.current-version }}

      - name: 🛠️🐂
        uses: ./.github/actions/setup-tauri

      - name: 🛠️🚀
        if: (!inputs.tagName)
        uses: ./.github/actions/setup-sccache

      - name: 🔑 Import windows signing certificate (windows only)
        if: contains(matrix.os, 'windows')
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType directory -Path certificate
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -path certificate -include tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: 🔨 Build plain executables using tauri action (publish artifacts on release)
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        if: ${{ !contains(matrix.os, 'macos') }}
        env:
          RUSTFLAGS: "-D warnings"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tagName }}
          releaseDraft: false
          prerelease: false
          tauriScript: cargo --locked auditable tauri
          args: ${{ matrix.args }} --no-bundle
          retryAttempts: 1
          uploadPlainBinary: true

      - name: 🔨 Build bundles using tauri action (publish artifacts on release)
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          RUSTFLAGS: "-D warnings"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          updaterJsonPreferNsis: true
          tagName: ${{ inputs.tagName }}
          releaseDraft: false
          prerelease: false
          tauriScript: cargo --locked auditable tauri
          args: ${{ matrix.args }}
          retryAttempts: 1

      - name: 📤 Upload build artifacts (push or pr builds only)
        if: (!inputs.tagName)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "bundles-${{matrix.os}}${{matrix.args}}"
          path: |
            target/**/release/bundle
            target/**/release/mdns-browser*

      - name: 📦 Compress debug symbols (Windows)
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          Compress-Archive -Path "target/release/mdns_browser.pdb" -DestinationPath "target/release/mdns_browser.pdb.zip" -Force
          Write-Output "Compressed target/release/mdns_browser.pdb -> target/release/mdns_browser.pdb.zip"

      - name: 📦 Compress debug symbols (Linux)
        if: contains(matrix.os, 'ubuntu')
        shell: bash
        run: |
          tar -czf "target/release/mdns-browser.dwp.tar.gz" -C target/release mdns-browser.dwp
          echo "Compressed target/release/mdns-browser.dwp -> target/release/mdns-browser.dwp.tar.gz"

      - name: 📦 Compress debug symbols (macOS)
        if: contains(matrix.os, 'macos')
        shell: bash
        run: |
          for ARCH in x86_64-apple-darwin aarch64-apple-darwin; do
            DSYM_LINK="target/$ARCH/release/mdns-browser.dSYM"
            if [ ! -L "$DSYM_LINK" ]; then
              echo "Error: dSYM symlink not found for $ARCH: $DSYM_LINK" >&2
              exit 1
            fi
            REAL_DSYM=$(readlink -f "$DSYM_LINK")
            if [ -z "$REAL_DSYM" ] || [ ! -e "$REAL_DSYM" ]; then
              echo "Error: dSYM symlink does not resolve for $ARCH: $DSYM_LINK -> $REAL_DSYM" >&2
              exit 1
            fi
            BASE=$(basename "$REAL_DSYM")
            tar -czf "target/$ARCH/release/deps/$BASE.tar.gz" -C "target/$ARCH/release/deps" "$BASE"
            echo "Compressed $REAL_DSYM -> target/$ARCH/release/deps/$BASE.tar.gz"
          done

      - name: 📤 Upload debug symbols
        if: (!inputs.tagName)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "debug-symbols-${{matrix.os}}${{matrix.args}}"
          path: |
            target/release/mdns_browser.pdb.zip
            target/release/mdns-browser.dwp.tar.gz
            target/x86_64-apple-darwin/release/deps/mdns_browser-*.dSYM.tar.gz
            target/aarch64-apple-darwin/release/deps/mdns_browser-*.dSYM.tar.gz

      - name: 📤 Publish debug symbols to release
        if: inputs.tagName
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ inputs.tagName }}
          files: |
            target/release/mdns_browser.pdb.zip
            target/release/mdns-browser.dwp.tar.gz
            target/x86_64-apple-darwin/release/deps/mdns_browser-*.dSYM.tar.gz
            target/aarch64-apple-darwin/release/deps/mdns_browser-*.dSYM.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛡️ Attest build provenance (publish release only)
        if: inputs.tagName
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: |
            target/release/bundle/nsis/*
            target/**/release/bundle/macos/*.tar.gz*
            target/**/release/bundle/dmg/*.dmg
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/**/release/mdns-browser
            target/release/mdns-browser.exe
            target/release/mdns_browser.pdb
            target/release/mdns_browser.pdb.zip
            target/release/mdns-browser.dwp
            target/release/mdns-browser.dwp.tar.gz
            target/x86_64-apple-darwin/release/deps/mdns_browser-*.dSYM
            target/x86_64-apple-darwin/release/deps/mdns_browser-*.dSYM.tar.gz
            target/aarch64-apple-darwin/release/deps/mdns_browser-*.dSYM
            target/aarch64-apple-darwin/release/deps/mdns_browser-*.dSYM.tar.gz

      - name: 🛡️ Attest SBOM
        if: inputs.tagName
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-path: ${{
            contains(matrix.os, 'ubuntu') && 'target/release/mdns-browser' ||
            contains(matrix.os, 'windows') && 'target/release/mdns-browser.exe' ||
            contains(matrix.os, 'macos') && 'target/universal-apple-darwin/release/mdns-browser'
            }}
          sbom-path: "sbom.spdx.json"
