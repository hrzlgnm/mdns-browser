name: Create and publish source checksum
on:
  workflow_call:
    inputs:
      tagName:
        description: The tag name of release to publish for
        type: string
        required: false
      semver:
        description: The semver of release to publish for
        type: string
        required: false

permissions:
  contents: write

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-slim
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 🏷️
        id: tag
        run: |
          if [ -n "${{ inputs.tagName }}" ]; then
            echo "tag=${{ inputs.tagName }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.release.name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.semver }}" ]; then
            echo "tag=mdns-browser-v${{ github.event.inputs.semver }}" >> $GITHUB_OUTPUT
          else
            echo "No tag provided" && exit 1
          fi

  generate_checksums:
    name: 🔢☑️
    runs-on: ubuntu-slim
    needs:
      - tag
    strategy:
      matrix:
        algorithm: [sha256]
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 1

      - name: 📥🔢☑️
        run: |
          set -o errexit
          curl -sLO https://github.com/hrzlgnm/mdns-browser/archive/refs/tags/${{ needs.tag.outputs.tag }}.tar.gz
          curl -sLO https://github.com/hrzlgnm/mdns-browser/archive/refs/tags/${{ needs.tag.outputs.tag }}.zip
          for file in *; do
            if [ -f "$file" ] && [[ "$file" != *.sha* ]]; then
              ${{ matrix.algorithm }}sum "$file" > "$file.${{ matrix.algorithm }}"
            fi
          done
      - name: 📤
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.algorithm }}-source-checksums
          path: "*.${{ matrix.algorithm }}"

  publish:
    name: 📰🔢☑️
    runs-on: ubuntu-slim
    needs:
      - tag
      - generate_checksums
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 1

      - name: 📥 artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7

      - name: 📰🔢☑️
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          append_body: true
          make_latest: false
          generate_release_notes: false
          files: |
            **/*.sha*
