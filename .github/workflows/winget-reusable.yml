name: Publish Desktop Release to WinGet

on:
  workflow_call:
  workflow_dispatch:
  release:
    types: [released]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 🏷️ Get latest release info
        id: release-info
        uses: ./.github/actions/latest-release-info

      - name: 🛠️ Get latest installer url 🔗
        shell: bash
        run: |
          TAG_NAME=${{ steps.release-info.outputs.tagName }}
          VERSION=${{ steps.release-info.outputs.version }}
          URL=https://github.com/hrzlgnm/mdns-browser/releases/download/${TAG_NAME}/mdns-browser_${VERSION}_x64-setup.exe
          echo "URL=$URL" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected latest tag name: $TAG_NAME"
          echo "URL: $URL"
          echo "Version: $VERSION"

      - name: 🆙 sync our fork of winget-pkgs
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        uses: michidk/run-komac@9b27eadc6e9235c252444a437d246c139da2f57f # v2.1.0
        with:
          args: "sync-fork --token=$WINGET_TOKEN"

      - name: 🆙 winget package
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        uses: michidk/run-komac@9b27eadc6e9235c252444a437d246c139da2f57f # v2.1.0
        with:
          args: "update hrzlgnm.mdns-browser --version $VERSION --urls $URL --submit --token=$WINGET_TOKEN"

      - name: 🧹 Cleanup merged branches
        if: always()
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        uses: michidk/run-komac@9b27eadc6e9235c252444a437d246c139da2f57f # v2.1.0
        with:
          args: "cleanup --only-merged --token=$WINGET_TOKEN"
