name: Create and publish checksums of release assets
on:
  workflow_call:
    inputs:
      tagName:
        description: The tag name of release to publish for
        type: string
        required: false
      semver:
        description: The semver of release to publish for
        type: string
        required: false

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-slim
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 🏷️
        id: tag
        run: |
          if [ -n "${{ inputs.tagName }}" ]; then
            echo "tag=${{ inputs.tagName }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.semver }}" ]; then
            echo "tag=mdns-browser-v${{ inputs.semver }}" >> "$GITHUB_OUTPUT"
          else
            echo "No tag provided" && exit 1
          fi

  generate_checksums:
    name: 🔢☑️
    runs-on: ubuntu-slim
    needs:
      - tag
    strategy:
      matrix:
        algorithm: [sha256]
    steps:
      - name: 📥 assets
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
        with:
          repository: ${{ github.repository }}
          tag: ${{ needs.tag.outputs.tag }}
          fileName: "mdns?browser*"
      - name: 🔢☑️
        shell: bash
        env:
          TAG_NAME: ${{ needs.tag.outputs.tag }}
        run: |
          for file in *; do
            # skip and delete files matching the tag name (sources)
            if [[ "$file" == *"$TAG_NAME"* ]]; then
              rm "$file"
              continue
            fi
            if [ -f "$file" ] && [[ "$file" != *.sha* ]]; then
              ${{ matrix.algorithm }}sum "$file" > "$file.${{ matrix.algorithm }}"
            fi
          done
          ls
      - name: 📤
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.algorithm }}-asset-checksums
          path: "*.${{ matrix.algorithm }}"

  publish:
    name: 📰🔢☑️
    runs-on: ubuntu-slim
    needs:
      - tag
      - generate_checksums
    steps:
      - name: 📥 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

      - name: 📰🔢☑️
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          append_body: true
          make_latest: false
          generate_release_notes: false
          files: |
            **/*.sha*
